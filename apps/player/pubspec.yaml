name: player
description: Application joueur pour les jeux bibliques en réseau (Flutter Web).
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  firebase_core: ^4.7.0
  go_router: ^17.2.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Carte interactive (Moyen-Orient)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  generate: true
  uses-material-design: true

assets:
  - assets/icons/
  - assets/data/